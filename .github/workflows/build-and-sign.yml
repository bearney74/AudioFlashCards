name: Build and Sign
on: [push]

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pyinstaller -r requirements.txt
      - run: pyinstaller --onefile your_script.py

      # Sigstore signing
      - uses: sigstore/gh-action-sigstore-python@v3
        with:
          inputs: dist/your_script

      - uses: actions/upload-artifact@v4
        with:
          name: signed-executable
          path: dist/your_script* # Upload binary and signature files
